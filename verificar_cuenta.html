<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSpa - Verificar Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #2D7A6B 0%, #1A4A40 50%, #C9956A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 48px 44px;
            width: 480px;
            max-width: 95vw;
            box-shadow: 0 12px 48px rgba(0,0,0,0.16);
            text-align: center;
        }
        .paw-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2D7A6B, #C9956A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #2C2C2C;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6B6B6B;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #6B6B6B;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8E4DF;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.5rem;
            background: #FAF6F0;
            outline: none;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
        }
        input:focus {
            border-color: #2D7A6B;
            background: white;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2D7A6B, #3D9B8A);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45,122,107,0.4);
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }
        .message.success {
            background: #E8F8F0;
            color: #2EA87A;
            display: block;
        }
        .message.error {
            background: #FFEDED;
            color: #C4532A;
            display: block;
        }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #2D7A6B;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .email-info {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #666;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="paw-icon">🐾</div>
        <h1>Verifica tu cuenta</h1>
        <p class="subtitle">Ingresa el código de 6 dígitos que enviamos a tu correo electrónico</p>
        
        <div id="emailInfo" class="email-info"></div>
        <div id="message" class="message"></div>
        
        <div class="form-group">
            <label>Código de verificación</label>
            <input type="text" id="codigo" maxlength="6" placeholder="••••••" autocomplete="off">
        </div>
        
        <button onclick="verificarToken()">Verificar cuenta</button>
        
        <a href="index.php" class="back-link">← Volver al inicio de sesión</a>
    </div>

    <script>
        // Obtener email de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        // Mostrar el email en la página
        const emailInfo = document.getElementById('emailInfo');
        if (email) {
            emailInfo.innerHTML = '📧 Verificando cuenta: <strong>' + email + '</strong>';
            console.log('Email a verificar:', email);
        } else {
            emailInfo.innerHTML = '⚠️ No se encontró el correo a verificar. Por favor, regístrate nuevamente.';
            emailInfo.style.background = '#FFEDED';
            emailInfo.style.color = '#C4532A';
        }
        
        // Limitar a solo números y máximo 6 caracteres
        const codigoInput = document.getElementById('codigo');
        codigoInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
        
        async function verificarToken() {
            const codigo = document.getElementById('codigo').value.trim();
            const messageDiv = document.getElementById('message');
            
            if (!email) {
                messageDiv.textContent = '❌ Error: No se encontró el correo a verificar.';
                messageDiv.className = 'message error';
                return;
            }
            
            if (codigo.length !== 6) {
                messageDiv.textContent = '❌ Por favor ingresa el código de 6 dígitos';
                messageDiv.className = 'message error';
                return;
            }
            
            // Mostrar loading
            messageDiv.textContent = '⏳ Verificando...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'block';
            
            try {
                console.log('Enviando petición a:', '/pawspa/api/verificar_token.php');
                console.log('Datos:', { email: email, codigo: codigo });
                
                const response = await fetch('/pawspa/api/verificar_token.php', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email: email, codigo: codigo })
                });
                
                console.log('Status HTTP:', response.status);
                
                const data = await response.json();
                console.log('Respuesta:', data);
                
                if (data.success) {
                    messageDiv.textContent = '✅ ' + data.message;
                    messageDiv.className = 'message success';
                    // Redirigir al login después de 3 segundos
                    setTimeout(() => {
                        window.location.href = 'index.php';
                    }, 3000);
                } else {
                    messageDiv.textContent = '❌ ' + data.error;
                    messageDiv.className = 'message error';
                    document.getElementById('codigo').value = '';
                    document.getElementById('codigo').focus();
                }
            } catch (error) {
                console.error('Error detallado:', error);
                messageDiv.textContent = '❌ Error de conexión: ' + error.message;
                messageDiv.className = 'message error';
            }
        }
        
        // Permitir presionar Enter para verificar
        codigoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verificarToken();
            }
        });
        
        // Auto-focus en el campo de código
        setTimeout(() => {
            codigoInput.focus();
        }, 500);
    </script>
</body>
</html>
